<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.openai.com; media-src 'self' mediastream: blob:;"
  />
  <title>Screen Voice Capture and Summary</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f7fb;
      color: #172033;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .capture {
      padding: 22px;
      display: grid;
      grid-template-rows: auto auto minmax(180px, 1fr) minmax(120px, 0.58fr);
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status-line {
      margin-top: 6px;
      color: #5f6f87;
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid #c8d2e0;
      background: #ffffff;
      color: #172033;
      border-radius: 8px;
      padding: 9px 14px;
      min-height: 38px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    button:hover:not(:disabled) {
      background: #eef4fb;
      border-color: #8fa4bd;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .primary {
      background: #0f8f7f;
      border-color: #0f8f7f;
      color: #ffffff;
    }

    .primary:hover:not(:disabled) {
      background: #0a7469;
      border-color: #0a7469;
    }

    .danger {
      background: #b6373d;
      border-color: #b6373d;
      color: #ffffff;
    }

    .danger:hover:not(:disabled) {
      background: #92282f;
      border-color: #92282f;
    }

    .compact {
      padding: 7px 12px;
      min-height: 34px;
      font-size: 13px;
    }

    .meter {
      min-width: 132px;
      padding: 8px 11px;
      border: 1px solid #d6deea;
      border-radius: 8px;
      background: #ffffff;
      color: #40516b;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .notice {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #d6deea;
      border-radius: 8px;
      background: #ffffff;
      color: #40516b;
      font-size: 13px;
      min-height: 42px;
    }

    .notice strong {
      color: #172033;
      font-weight: 700;
    }

    .columns {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.75fr);
      gap: 14px;
      min-height: 0;
    }

    .panel {
      border: 1px solid #d6deea;
      border-radius: 8px;
      background: #ffffff;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-bottom: 1px solid #e3e9f2;
      color: #40516b;
      font-size: 13px;
      font-weight: 700;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid #c8d2e0;
      border-radius: 8px;
      background: #ffffff;
      color: #172033;
      outline: none;
      font-size: 14px;
    }

    textarea:focus,
    input:focus {
      border-color: #0f8f7f;
      box-shadow: 0 0 0 3px rgba(15, 143, 127, 0.14);
    }

    textarea {
      min-height: 0;
      padding: 12px;
      line-height: 1.52;
      resize: none;
      border: 0;
      border-radius: 0;
    }

    input {
      padding: 8px 10px;
    }

    .summary-wrap {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
    }

    .summary-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .settings {
      border-top: 1px solid #cbd7e6;
      background: #eaf0f7;
      padding: 16px 22px 18px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 0.78fr) minmax(260px, 1fr);
      gap: 14px;
    }

    .setting-box {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #40516b;
    }

    .license-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .small-text {
      min-height: 16px;
      color: #5f6f87;
      font-size: 12px;
    }

    #summaryPrompt {
      min-height: 68px;
      resize: vertical;
      border: 1px solid #c8d2e0;
      border-radius: 8px;
    }

    @media (max-width: 920px) {
      .columns,
      .settings {
        grid-template-columns: 1fr;
      }

      .capture {
        grid-template-rows: auto auto minmax(210px, 1fr) minmax(160px, 0.7fr);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="capture" aria-label="Capture workspace">
      <div class="topbar">
        <div>
          <h1>Screen Voice Capture and Summary</h1>
          <div id="status" class="status-line">Ready</div>
        </div>
        <div class="actions">
          <div id="recordingTime" class="meter">00:00</div>
          <button id="startBtn" class="primary" type="button">Start capture</button>
          <button id="stopBtn" class="danger" type="button" disabled>Stop</button>
        </div>
      </div>

      <div id="accessNotice" class="notice">
        <span><strong id="accessTitle">Trial active</strong> <span id="accessDetail"></span></span>
        <span id="queueStatus">0 chunks</span>
      </div>

      <div class="columns">
        <section class="panel" aria-label="Transcript">
          <div class="panel-head">
            <span>Transcript</span>
            <button id="clearTranscriptBtn" class="compact" type="button">Clear</button>
          </div>
          <textarea id="transcript" spellcheck="true"></textarea>
        </section>

        <section class="panel" aria-label="Summary">
          <div class="panel-head">
            <span>Summary</span>
            <button id="summaryBtn" class="compact" type="button">Create summary</button>
          </div>
          <textarea id="summary" spellcheck="true"></textarea>
        </section>
      </div>
    </section>

    <section class="settings" aria-label="Settings">
      <div class="setting-box">
        <label for="openAiKey">OpenAI API key</label>
        <input id="openAiKey" type="password" placeholder="sk-..." autocomplete="off" />
        <div id="openAiKeyStatus" class="small-text"></div>
      </div>

      <div class="setting-box">
        <label for="licenseKey">License key</label>
        <div class="license-row">
          <input id="licenseKey" type="text" placeholder="SVC-..." autocomplete="off" />
          <button id="activateLicenseBtn" class="compact" type="button">Activate</button>
        </div>
        <div id="licenseStatus" class="small-text"></div>
      </div>

      <div class="setting-box">
        <label for="summaryPrompt">Summary prompt</label>
        <textarea id="summaryPrompt">Summarize the transcript into concise bullet points. Keep names, decisions, dates, questions, and next steps.</textarea>
      </div>
    </section>
  </main>

  <script src="./license-hashes.js"></script>
  <script src="./renderer.js" defer></script>
</body>
</html>
